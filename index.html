<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    <title>Site Netflix</title>
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema" style="margin-top:16px; padding:8px 16px; border-radius:6px; border:none; background:#e50914; color:#fff; font-weight:600; cursor:pointer; font-size:1.5rem; display:flex; align-items:center; justify-content:center; width:48px; height:48px;">
            <span id="theme-icon" aria-hidden="true">🌙</span>
        </button>
    </header>
    <main>
        <section class="profiles">
            <ul>
                <li>
                    <ol>
                        <li>
                            <figure class="profile">
                                <img src="imagens/perfil1.jpg" alt="imagem de uma mulher negra sorrindo de cabelo cacheado e usando oculos de grau">
                                <figcaption>Ana</figcaption>
                            </figure>
                        </li>
                        <li>
                            <figure class="profile">
                                <img src="imagens/perfil-2.png" alt="Pokémon Meowth na sua forma Galariana. Ele tem pelagem cinza, uma cauda enrolada e um detalhe dourado em forma de moeda oval na testa. Está em pé sobre duas patas, com os braços erguidos em uma pose que transmite confiança ou brincadeira">
                                <figcaption>Greick Padua</figcaption>
                            </figure>
                        </li>
                        <li>
                            <figure class="profile">
                                <img src="imagens/perfil-3.png" alt="Avatar de perfil 3">
                                <figcaption>Greick</figcaption>
                            </figure>
                        </li>
                        <li>
                            <figure class="profile">
                                <img src="imagens/perfil-4.png" alt="Avatar de perfil 4">
                                <figcaption>Perfil 4</figcaption>
                            </figure>
                        </li>
                        <li>
                            <figure class="profile">
                                <img src="imagens/perfil-5.png" alt="Avatar de perfil 5">
                                <figcaption>Perfil 5</figcaption>
                            </figure>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
